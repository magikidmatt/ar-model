<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AR Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      height: 100dvh;
      width: 100dvw;
      overflow: hidden;
      touch-action: none;
    }

    /* ── model-viewer fills the screen ── */
    model-viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #111;
      --poster-color: transparent;
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 32px 24px;
      background: rgba(10,10,10,0.93);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.03);
    }

    .screen-icon { font-size: 48px; line-height: 1; }
    .screen h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; text-align: center; }
    .screen p { font-size: 14px; color: #888; text-align: center; max-width: 300px; line-height: 1.6; }

    /* ── Upload ── */
    .upload-zone {
      width: 100%;
      max-width: 340px;
      border: 2px dashed #333;
      border-radius: 20px;
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(255,255,255,0.03);
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6c5ce7;
      background: rgba(108,92,231,0.08);
    }

    .upload-zone .icon { font-size: 36px; }
    .upload-zone .label { font-size: 14px; color: #aaa; }
    .upload-zone .hint { font-size: 12px; color: #555; }

    #file-input { display: none; }

    /* ── Model Ready Card ── */
    #model-ready-card {
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .model-info { display: flex; align-items: center; gap: 12px; }

    .model-icon {
      width: 44px; height: 44px;
      background: rgba(108,92,231,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .model-meta { flex: 1; min-width: 0; }

    .model-name {
      font-size: 14px; font-weight: 600; color: #fff;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .model-size { font-size: 12px; color: #666; margin-top: 2px; }

    .btn-change {
      font-size: 12px; color: #666; background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s; width: auto; align-self: flex-start;
    }

    .btn-change:hover { color: #999; background: rgba(255,255,255,0.06); }

    /* ── Buttons ── */
    .btn {
      padding: 15px 28px;
      border-radius: 14px;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      text-align: center;
    }

    .btn:active { transform: scale(0.95); }

    .btn-ar {
      background: linear-gradient(135deg, #00c9a7, #00e5ff);
      color: #0a0a0a; font-weight: 700; font-size: 16px;
      box-shadow: 0 4px 24px rgba(0,201,167,0.4);
    }

    .btn-3d {
      background: rgba(255,255,255,0.09); color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-3d:hover { background: rgba(255,255,255,0.14); }

    /* ── Loading ── */
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(108,92,231,0.2);
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Top Bar ── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    #top-bar.visible { opacity: 1; pointer-events: all; }

    .model-name-top {
      font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 600;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .icon-btn {
      width: 40px; height: 40px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.5); color: #fff;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.16); }
    .icon-btn:active { transform: scale(0.92); }

    /* ── Controls Bar ── */
    #controls-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      padding: 16px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #controls-bar.visible { opacity: 1; pointer-events: all; }

    .controls-hint { font-size: 11px; color: rgba(255,255,255,0.45); text-align: center; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 130px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(0,0,0,0.88); color: #fff;
      padding: 12px 24px; border-radius: 12px;
      font-size: 14px; z-index: 30;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; text-align: center; max-width: 320px;
    }

    #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Checkmark SVG ── */
    .ar-supported { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #00c9a7; }
    .ar-unsupported { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ff6b6b; }
  </style>
</head>
<body>

  <!-- model-viewer AR element -->
  <model-viewer
    id="mv"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    shadow-intensity="1"
    shadow-softness="1"
    exposure="1"
    ar
    ar-modes="webxr scene-viewer quick-look"
    xr-environment
    loading="eager"
    reveal="manual"
    style="display:none;"
  ></model-viewer>

  <!-- ── Screen: Upload ── -->
  <div id="screen-upload" class="screen">
    <div class="screen-icon">🪄</div>
    <h1>AR Model Viewer</h1>
    <p>Select a <strong>.glb</strong> file, then place it in the real world with AR.</p>

    <label class="upload-zone" id="upload-zone">
      <div class="icon">📦</div>
      <div class="label">Tap or drop to select a GLB file</div>
      <div class="hint">GLB or GLTF</div>
      <input type="file" id="file-input" accept=".glb,.gltf" />
    </label>
  </div>

  <!-- ── Screen: Model Ready ── -->
  <div id="screen-ready" class="screen hidden">
    <div id="model-ready-card">
      <div class="model-info">
        <div class="model-icon">📦</div>
        <div class="model-meta">
          <div class="model-name" id="ready-model-name">model.glb</div>
          <div class="model-size" id="ready-model-size">—</div>
        </div>
      </div>
      <button class="btn-change" id="btn-change">Change file</button>
    </div>

    <div id="ar-support-badge"></div>

    <button class="btn btn-ar" id="btn-launch-ar">📷 View in AR</button>
    <button class="btn btn-3d" id="btn-view-3d">👁 View in 3D</button>
  </div>

  <!-- ── Screen: Loading ── -->
  <div id="screen-loading" class="screen hidden">
    <div class="spinner"></div>
    <h1 id="loading-title">Loading…</h1>
    <p id="loading-sub">Please wait</p>
  </div>

  <!-- ── Top Bar ── -->
  <div id="top-bar">
    <div class="model-name-top" id="model-name-top">Model</div>
    <button class="icon-btn" id="btn-close">✕</button>
  </div>

  <!-- ── Controls Bar ── -->
  <div id="controls-bar">
    <div class="controls-hint">Drag to rotate · Pinch to zoom</div>
    <button class="btn btn-ar" id="btn-ar-controls" style="width:200px;font-size:14px;">📷 View in AR</button>
  </div>

  <!-- ── Toast ── -->
  <div id="toast"></div>

  <script type="module">
    // ── DOM ───────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const screenUpload  = $('screen-upload');
    const screenReady  = $('screen-ready');
    const screenLoading = $('screen-loading');
    const topBar = $('top-bar');
    const controlsBar = $('controls-bar');
    const toast = $('toast');

    const mv = $('mv');
    const fileInput = $('file-input');
    const uploadZone = $('upload-zone');
    const btnChange = $('btn-change');
    const btnLaunchAR = $('btn-launch-ar');
    const btnView3d = $('btn-view-3d');
    const btnArControls = $('btn-ar-controls');
    const btnClose = $('btn-close');
    const arSupportBadge = $('ar-support-badge');
    const modelNameTop = $('model-name-top');
    const readyModelName = $('ready-model-name');
    const readyModelSize = $('ready-model-size');
    const loadingTitle = $('loading-title');
    const loadingSub = $('loading-sub');

    // ── State ──────────────────────────────────────────────────────────────
    let currentFile = null;
    let currentURL = null;
    let isViewerMode = false;

    // ── Toast ──────────────────────────────────────────────────────────────
    function showToast(msg, dur = 2500) {
      toast.textContent = msg;
      toast.classList.add('visible');
      clearTimeout(window._tt);
      window._tt = setTimeout(() => toast.classList.remove('visible'), dur);
    }

    // ── Screen helpers ───────────────────────────────────────────────────────
    function showScreen(name) {
      [screenUpload, screenReady, screenLoading].forEach(s => s.classList.add('hidden'));
      if (name === 'upload')  { screenUpload.classList.remove('hidden'); return; }
      if (name === 'ready')   { screenReady.classList.remove('hidden'); return; }
      if (name === 'loading') { screenLoading.classList.remove('hidden'); return; }
    }

    function showViewerUI() {
      mv.style.display = 'block';
      topBar.classList.add('visible');
      controlsBar.classList.add('visible');
      modelNameTop.textContent = currentFile?.name || 'Model';
    }

    function hideViewerUI() {
      mv.style.display = 'none';
      topBar.classList.remove('visible');
      controlsBar.classList.remove('visible');
    }

    // ── AR support check ───────────────────────────────────────────────────
    async function checkARSupport() {
      const ua = navigator.userAgent;
      const isIOS = /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/.test(ua);
      const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua) && !/Edg/.test(ua);
      const isChromeMobile = /Chrome/.test(ua) && !/Edg/.test(ua) && (isAndroid || isIOS);

      if (isIOS && isSafari) {
        // iPhone/iPad Safari: uses AR Quick Look (no WebXR needed)
        // iOS 12+ supports AR Quick Look; iOS 16+ has WebXR but it's unreliable on older devices
        return {
          supported: true,
          method: 'quick-look',
          label: '✓ AR Quick Look available on iOS'
        };
      }

      if (isAndroid && /Chrome/.test(ua)) {
        // Android Chrome: try WebXR first, fall back to Scene Viewer
        if (navigator.xr) {
          try {
            const ok = await navigator.xr.isSessionSupported('immersive-ar');
            if (ok) return { supported: true, method: 'webxr', label: '✓ ARCore available' };
          } catch (_) {}
        }
        return { supported: true, method: 'scene-viewer', label: '✓ Scene Viewer available' };
      }

      if (isAndroid) {
        return { supported: true, method: 'scene-viewer', label: '✓ AR available' };
      }

      // Desktop or unknown: 3D only
      return { supported: false, method: null, label: 'AR works on iPhone/iPad and Android' };
    }

    // ── Load model ─────────────────────────────────────────────────────────
    function formatSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function loadModel(file) {
      showScreen('loading');
      loadingTitle.textContent = `Loading "${file.name}"…`;
      loadingSub.textContent = 'Please wait';

      // Revoke old URL
      if (currentURL) { URL.revokeObjectURL(currentURL); currentURL = null; }

      const url = URL.createObjectURL(file);
      currentURL = url;
      currentFile = file;

      // Set poster (loading placeholder handled by spinner)
      mv.poster = '';

      return new Promise((resolve, reject) => {
        mv.addEventListener('load', () => {
          loadingSub.textContent = 'Ready';
          resolve();
        }, { once: true });

        mv.addEventListener('error', (e) => {
          reject(e);
        }, { once: true });

        // Set src last to trigger load
        mv.src = url;
      });
    }

    async function onFileSelected(file) {
      try {
        await loadModel(file);
        readyModelName.textContent = file.name;
        readyModelSize.textContent = formatSize(file.size);

        const check = await checkARSupport();
        if (check.supported) {
          arSupportBadge.innerHTML = `<div class="ar-supported">✓ ${check.label}</div>`;
        } else {
          arSupportBadge.innerHTML = `<div class="ar-unsupported">⚠ ${check.label}</div>`;
        }

        showScreen('ready');
      } catch (err) {
        console.error(err);
        showScreen('upload');
        showToast('Failed to load. Try another file.');
      }
    }

    // ── 3D Viewer mode ─────────────────────────────────────────────────────
    function enterViewer() {
      isViewerMode = true;
      showScreen('');
      showViewerUI();

      // Disable auto-rotate so user has full control
      mv.removeAttribute('auto-rotate');

      // Reveal model
      mv.reveal = 'auto';

      showToast('Drag to rotate · Pinch or scroll to zoom', 3000);
    }

    // ── AR mode ────────────────────────────────────────────────────────────
    async function launchAR() {
      if (!currentURL) return;

      const ua = navigator.userAgent;
      const isIOS = /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua) && !/Edg/.test(ua);

      // iOS Safari: force quick-look only (WebXR not available on iPhone 11)
      if (isIOS && isSafari) {
        mv.arModes = 'quick-look';
      } else {
        mv.arModes = 'webxr scene-viewer quick-look';
      }

      mv.reveal = 'auto';
      showScreen('');
      showViewerUI();

      // activateAR opens AR automatically in the best available mode
      mv.activateAR().catch(err => {
        console.warn('AR activation error:', err);
        showToast('Could not start AR. Make sure you\'re on an AR-capable device.', 4000);
      });
    }

    // ── Events ─────────────────────────────────────────────────────────────

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) onFileSelected(file);
    });

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) onFileSelected(file);
    });

    btnChange.addEventListener('click', () => fileInput.click());

    btnLaunchAR.addEventListener('click', launchAR);
    btnView3d.addEventListener('click', enterViewer);
    btnArControls.addEventListener('click', launchAR);

    btnClose.addEventListener('click', () => {
      if (currentURL) { URL.revokeObjectURL(currentURL); currentURL = null; }
      currentFile = null;
      mv.src = '';
      isViewerMode = false;
      hideViewerUI();
      showScreen('upload');
      arSupportBadge.innerHTML = '';
      fileInput.value = '';
    });

    // model-viewer events
    mv.addEventListener('ar-status', (e) => {
      // e.detail.status: 'session-started', 'session-ended', 'not-presented'
      if (e.detail.status === 'session-ended') {
        // AR session ended — stay in viewer
      }
    });

    mv.addEventListener('load', () => {
      // Model loaded
    });

  </script>
</body>
</html>
